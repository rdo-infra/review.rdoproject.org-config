---
- hosts: localhost
  roles:
    - role: generate-zuul-manifest
    - role: add-fileserver
      fileserver: "{{ site_logs }}"

- hosts: localhost
  tasks:
    - name: Generate bulk log download script
      include_role:
        name: local-log-download
      vars:
        local_log_download_api: 'https://gateway-cloud-softwarefactory.apps.ocp.cloud.ci.centos.org/zuul/api'

    - name: Register quick-download link
      zuul_return:
        data:
          zuul:
            artifacts:
              - name: Logs download script
                url: 'download-logs.sh'

- hosts: a71a93e18f1524007a0994a866a4da93-48298913.us-east-1.elb.amazonaws.com
  gather_facts: False
  roles:
    - role: upload-logs
      zuul_log_url: "{{ site_logs.url }}"
      zuul_logserver_root: "{{ site_logs.path }}"
    - role: buildset-artifacts-location
      zuul_log_url: "{{ site_logs.url }}"
